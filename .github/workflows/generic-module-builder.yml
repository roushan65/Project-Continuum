name: Generic-Module-Builder

on:
  workflow_call:
    inputs:
      module-name:
        description: 'The Gradle module to build (e.g., continuum-api-server)'
        required: true
        type: string
      release:
        description: 'Publish as a release build (no SNAPSHOT suffix)'
        required: true
        type: boolean
        default: false
      publish_to_maven:
        description: 'Publish artifacts to Maven Central via JReleaser'
        required: false
        type: boolean
        default: false
      publish_to_docker_hub:
        description: 'Push container images to Docker Hub via Jib'
        required: false
        type: boolean
        default: false
    secrets:
      MAVEN_REPO_USERNAME:
        description: 'Username for publishing to Maven repository'
        required: true
      MAVEN_REPO_PASSWORD:
        description: 'Password for publishing to Maven repository'
        required: true
      GPG_KEY_ID:
        description: 'GPG key ID for signing artifacts'
        required: true
      GPG_PASSPHRASE:
        description: 'Password for the GPG key'
        required: true
      GPG_SECRET_KEY:
        description: 'Armored GPG private key for signing artifacts'
        required: true
      GPG_PUBLIC_KEY:
        description: 'Armored GPG public key for JReleaser signing verification'
        required: true
      DOCKER_HUB_USERNAME:
        description: 'Docker Hub username for pushing container images'
        required: true
      DOCKER_HUB_PASSWORD:
        description: 'Docker Hub password for pushing container images'
        required: true
jobs:
  build:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    outputs:
      module-name: ${{ inputs.module-name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build and test
        run: |
          if [ "${{ inputs.module-name }}" = "all" ]; then
            ./gradlew build --no-daemon
          else
            ./gradlew :${{ inputs.module-name }}:build --no-daemon
          fi
        env:
          IS_RELEASE_BUILD: ${{ inputs.release }}

      - name: Publish to local staging
        if: inputs.publish_to_maven
        run: |
          if [ "${{ inputs.module-name }}" = "all" ]; then
            ./gradlew publish --no-daemon
          else
            ./gradlew :${{ inputs.module-name }}:publish --no-daemon
          fi
        env:
          IS_RELEASE_BUILD: ${{ inputs.release }}
          MAVEN_REPO_USERNAME: ${{ secrets.MAVEN_REPO_USERNAME }}
          MAVEN_REPO_PASSWORD: ${{ secrets.MAVEN_REPO_PASSWORD }}

      - name: Deploy to Maven Central via JReleaser
        if: inputs.publish_to_maven && inputs.release
        run: |
          if [ "${{ inputs.module-name }}" = "all" ]; then
            ./gradlew jreleaserDeploy --no-daemon
          else
            ./gradlew :${{ inputs.module-name }}:jreleaserDeploy --no-daemon
          fi
        env:
          IS_RELEASE_BUILD: ${{ inputs.release }}
          JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME: ${{ secrets.MAVEN_REPO_USERNAME }}
          JRELEASER_MAVENCENTRAL_SONATYPE_TOKEN: ${{ secrets.MAVEN_REPO_PASSWORD }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_SECRET_KEY }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}

      - name: Containerize
        if: inputs.publish_to_docker_hub
        run: |
          if [ "${{ inputs.module-name }}" = "all" ]; then
            ./gradlew jib --no-daemon
          else
            ./gradlew :${{ inputs.module-name }}:jib --no-daemon
          fi
        env:
          IS_RELEASE_BUILD: ${{ inputs.release }}
          DOCKER_REPO_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_REPO_PASSWORD: ${{ secrets.DOCKER_HUB_PASSWORD }}
