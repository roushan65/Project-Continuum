name: Generic-Module-Builder

on:
  workflow_call:
    inputs:
      module-name:
        description: 'The Gradle module to build (e.g., continuum-api-server)'
        required: true
        type: string
      release:
        description: 'Publish as a release build (no SNAPSHOT suffix)'
        required: true
        type: boolean
        default: false
    secrets:
      MAVEN_REPO_USERNAME:
        description: 'Username for publishing to Maven repository'
        required: true
      MAVEN_REPO_PASSWORD:
        description: 'Password for publishing to Maven repository'
        required: true
      GPG_KEY_ID:
        description: 'GPG key ID for signing artifacts'
        required: true
      GPG_KEY_PASSWORD:
        description: 'Password for the GPG key'
        required: true
      GPG_KEY_BASE64:
        description: 'Base64-encoded GPG private key for signing artifacts'
        required: true
      DOCKER_HUB_USERNAME:
        description: 'Docker Hub username for pushing container images'
        required: true
      DOCKER_HUB_PASSWORD:
        description: 'Docker Hub password for pushing container images'
        required: true
jobs:
  build:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    outputs:
      module-name: ${{ inputs.module-name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Publish
        run: |
          if [ "${{ inputs.module-name }}" = "all" ]; then
            ./gradlew publish --no-daemon
          else
            ./gradlew :${{ inputs.module-name }}:publish --no-daemon
          fi
        env:
          IS_RELEASE_BUILD: ${{ inputs.release }}
          MAVEN_REPO_USERNAME: ${{ github.actor }}
          MAVEN_REPO_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_KEY_PASSWORD: ${{ secrets.GPG_KEY_PASSWORD }}
          GPG_KEY_BASE64: ${{ secrets.GPG_KEY_BASE64 }}

      - name: Containerize
        if: always()
        run: |
          if [ "${{ inputs.module-name }}" = "all" ]; then
            ./gradlew jib --no-daemon || echo "Some modules may not have jib tasks, continuing."
          else
            if ./gradlew :${{ inputs.module-name }}:tasks --all | grep -q "jib "; then
              ./gradlew :${{ inputs.module-name }}:jib --no-daemon
            else
              echo "Jib task does not exist for module ${{ inputs.module-name }}, skipping."
            fi
          fi
        env:
          IS_RELEASE_BUILD: ${{ inputs.release }}
          GITHUB_USER: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_REPO_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_REPO_PASSWORD: ${{ secrets.DOCKER_HUB_PASSWORD }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_KEY_PASSWORD: ${{ secrets.GPG_KEY_PASSWORD }}
          GPG_KEY_BASE64: ${{ secrets.GPG_KEY_BASE64 }}