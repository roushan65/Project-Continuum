name: Build Module

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Select a Gradle module to build.'
        required: true
        type: choice
        options:
          - all
          - continuum-api-server
          - continuum-avro-schemas
          - continuum-commons
          - continuum-knime-base
          - continuum-message-bridge
          - continuum-worker-springboot-starter
      release:
        description: 'Publish as a release build (immutable version, no SNAPSHOT suffix)'
        required: true
        type: boolean
        default: false
      publish_to_maven:
        description: 'Publish artifacts to Maven Central'
        required: true
        type: boolean
        default: false
      publish_to_docker_hub:
        description: 'Push container images to Docker Hub'
        required: true
        type: boolean
        default: false

jobs:
  build-module:
    uses: ./.github/workflows/generic-module-builder.yml
    with:
      module-name: ${{ github.event.inputs.module }}
      release: ${{ github.event.inputs.release == 'true' }}
      publish_to_maven: ${{ github.event.inputs.publish_to_maven == 'true' }}
      publish_to_docker_hub: ${{ github.event.inputs.publish_to_docker_hub == 'true' }}
    secrets:
      MAVEN_REPO_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      MAVEN_REPO_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      GPG_SECRET_KEY: ${{ secrets.GPG_SECRET_KEY }}
      GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      DOCKER_HUB_PASSWORD: ${{ secrets.DOCKER_HUB_PASSWORD }}
